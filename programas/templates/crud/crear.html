{% extends 'layout/layout_programa.html' %}

{% block content %}
  <main class="contenido-principal">
    <div class="titulo-seccion">
      <h2 class="titulo-pagina">CREAR NUEVO PROGRAMA</h2>
    </div>

    <form class="formulario-ficha" method="POST" action="{% url 'crear_programa' %}">
      {% csrf_token %}
      <div class="seccion-formulario">
        <h3 class="titulo-seccion-form">Datos del Programa</h3>

        <div class="fila-campos-2">
          <div class="campo-entrada">
            <label for="codigo" class="etiqueta-campo">Código del Programa *</label>
            <input type="text" name="codigo" id="codigo" class="entrada-texto"
                   placeholder="Ej: 21410101" required>
          </div>
          <div class="campo-entrada">
            <label for="version" class="etiqueta-campo">Versión *</label>
            <input type="text" name="version" id="version" class="entrada-texto"
                   placeholder="Ej: 1.0" required>
          </div>
        </div>

        <div class="campo-entrada">
          <label for="nombre" class="etiqueta-campo">Nombre del Programa *</label>
          <input type="text" name="nombre" id="nombre" class="entrada-texto"
                 placeholder="Ej: Gestión de Proyectos TIC" required>
        </div>

        <div class="fila-campos-2">
          <div class="campo-entrada">
            <label for="horas" class="etiqueta-campo">Horas *</label>
            <input type="number" name="horas" id="horas" class="entrada-texto"
                   placeholder="Ej: 120" required min="1">
          </div>
          <div class="campo-entrada">
            <label for="area" class="etiqueta-campo">Área *</label>
            <select name="area" id="area" class="entrada-select" required>
              <option value="">-- Seleccione un área --</option>
              {% for area in areas %}
                <option value="{{ area.idarea }}">{{ area.area }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <div class="contenedor-botones-formulario">
        <a href="{% url 'buscar_programa' %}" class="boton-cancelar">Cancelar</a>
        <button type="submit" class="boton-enviar">Crear Programa</button>
      </div>
    </form>
  </main>
{% endblock %}
